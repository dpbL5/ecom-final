    ports:
      - "8006:8000"
    depends_on:
      cart-db:
        condition: service_healthy
      pricing-service:
        condition: service_started
      inventory-service:
        condition: service_started
      order-service:
        condition: service_started

  cart-db:
    image: postgres:16-alpine
    environment:
