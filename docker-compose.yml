x-service-env: &service-env
  DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
  JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev-ecommerce-jwt-signing-key}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
  POSTGRES_PORT: "5432"
  SERVICE_HTTP_TIMEOUT: ${SERVICE_HTTP_TIMEOUT:-5}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
  CATALOG_SERVICE_URL: http://catalog-service:8000
  CUSTOMER_SERVICE_URL: http://customer-service:8000
  INVENTORY_SERVICE_URL: http://inventory-service:8000
  PRICING_SERVICE_URL: http://pricing-service:8000
  ORDER_SERVICE_URL: http://order-service:8000
  PAYMENT_SERVICE_URL: http://payment-service:8000
  SHIPPING_SERVICE_URL: http://shipping-service:8000
  SEARCH_SERVICE_URL: http://search-service:8000
  RECOMMENDATION_SERVICE_URL: http://recommendation-service:8000
  NOTIFICATION_SERVICE_URL: http://notification-service:8000

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}

x-service-build: &service-build
  context: .
  dockerfile: docker/django-service.Dockerfile

services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_IDENTITY_API_URL: ${VITE_IDENTITY_API_URL:-http://localhost:8080/identity}
        VITE_CUSTOMER_API_URL: ${VITE_CUSTOMER_API_URL:-http://localhost:8080/customer}
        VITE_CATALOG_API_URL: ${VITE_CATALOG_API_URL:-http://localhost:8080/catalog}
        VITE_INVENTORY_API_URL: ${VITE_INVENTORY_API_URL:-http://localhost:8080/inventory}
        VITE_PRICING_API_URL: ${VITE_PRICING_API_URL:-http://localhost:8080/pricing}
        VITE_CART_API_URL: ${VITE_CART_API_URL:-http://localhost:8080/cart}
        VITE_ORDER_API_URL: ${VITE_ORDER_API_URL:-http://localhost:8080/order}
        VITE_PAYMENT_API_URL: ${VITE_PAYMENT_API_URL:-http://localhost:8080/payment}
        VITE_SHIPPING_API_URL: ${VITE_SHIPPING_API_URL:-http://localhost:8080/shipping}
        VITE_SEARCH_API_URL: ${VITE_SEARCH_API_URL:-http://localhost:8080/search}
        VITE_RECOMMENDATION_API_URL: ${VITE_RECOMMENDATION_API_URL:-http://localhost:8080/recommendation}
        VITE_REVIEW_API_URL: ${VITE_REVIEW_API_URL:-http://localhost:8080/review}
        VITE_NOTIFICATION_API_URL: ${VITE_NOTIFICATION_API_URL:-http://localhost:8080/notification}
        VITE_RETURN_REFUND_API_URL: ${VITE_RETURN_REFUND_API_URL:-http://localhost:8080/return-refund}
        VITE_ANALYTICS_API_URL: ${VITE_ANALYTICS_API_URL:-http://localhost:8080/analytics}
        VITE_BACKOFFICE_API_URL: ${VITE_BACKOFFICE_API_URL:-http://localhost:8080/backoffice}
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_started
      identity-service:
        condition: service_started
      customer-service:
        condition: service_started
      catalog-service:
        condition: service_started
      inventory-service:
        condition: service_started
      pricing-service:
        condition: service_started
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      shipping-service:
        condition: service_started
      search-service:
        condition: service_started
      recommendation-service:
        condition: service_started
      review-service:
        condition: service_started
      notification-service:
        condition: service_started
      return-refund-service:
        condition: service_started
      analytics-service:
        condition: service_started
      admin-backoffice-service:
        condition: service_started

  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      identity-service:
        condition: service_started
      customer-service:
        condition: service_started
      catalog-service:
        condition: service_started
      inventory-service:
        condition: service_started
      pricing-service:
        condition: service_started
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      shipping-service:
        condition: service_started
      search-service:
        condition: service_started
      recommendation-service:
        condition: service_started
      review-service:
        condition: service_started
      notification-service:
        condition: service_started
      return-refund-service:
        condition: service_started
      analytics-service:
        condition: service_started
      admin-backoffice-service:
        condition: service_started

  identity-service:
    build:
      <<: *service-build
      args:
        SERVICE_DIR: services/identity_service
    environment:
      <<: *service-env
      POSTGRES_DB: identity_db
      POSTGRES_HOST: identity-db
      DJANGO_SECRET_KEY: ${IDENTITY_SECRET_KEY:-dev-identity-secret}
    ports:
      - "8001:8000"
    depends_on:
      identity-db:
        condition: service_healthy

  identity-db:
    image: postgres:16-alpine
    environment:
      <<: *postgres-env
      POSTGRES_DB: identity_db
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  customer-service:
    build:
      <<: *service-build
      args:
        SERVICE_DIR: services/customer_service
    environment:
      <<: *service-env
      POSTGRES_DB: customer_db
      POSTGRES_HOST: customer-db
      DJANGO_SECRET_KEY: ${CUSTOMER_SECRET_KEY:-dev-customer-secret}
    ports:
      - "8002:8000"
    depends_on:
      customer-db:
        condition: service_healthy

  customer-db:
