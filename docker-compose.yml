        condition: service_healthy

  search-db:
    image: postgres:16-alpine
    environment:
      <<: *postgres-env
      POSTGRES_DB: search_db
    volumes:
      - search-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  recommendation-service:
    build:
      <<: *service-build
      args:
        SERVICE_DIR: services/recommendation_service
    environment:
      <<: *service-env
      POSTGRES_DB: recommendation_db
      POSTGRES_HOST: recommendation-db
      DJANGO_SECRET_KEY: ${RECOMMENDATION_SECRET_KEY:-dev-recommendation-secret}
      NEO4J_ENABLED: ${NEO4J_ENABLED:-true}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-ecommerce-graph}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      GEMMA_API_KEY: ${GEMMA_API_KEY:-}
      GEMMA_MODEL: ${GEMMA_MODEL:-gemma-4-26b-a4b-it}
      GEMMA_BASE_URL: ${GEMMA_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMMA_TIMEOUT: ${GEMMA_TIMEOUT:-45}
      LSTM_SEQUENCE_LENGTH: ${LSTM_SEQUENCE_LENGTH:-6}
      LSTM_ARTIFACT_DIR: ${LSTM_ARTIFACT_DIR:-/app/recommendations/artifacts}
    ports:
      - "8011:8000"
    depends_on:
      recommendation-db:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  recommendation-db:
    image: postgres:16-alpine
    environment:
      <<: *postgres-env
      POSTGRES_DB: recommendation_db
    volumes:
      - recommendation-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-ecommerce-graph}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-ecommerce-graph} 'RETURN 1;' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

